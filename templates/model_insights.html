<!DOCTYPE html>
<html>
<head>
    <title>Model Insights</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background:#f4f6f9">

<div class="container mt-5">

<h3 class="mb-4 text-center">📊 Machine Learning Model Insights</h3>

<div class="row mb-4">
    <div class="col-md-6">
        <div class="card p-4 text-center shadow">
            <h6>Mean Squared Error</h6>
            <h4>{{ mse }}</h4>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card p-4 text-center shadow">
            <h6>R² Score</h6>
            <h4>{{ r2 }}</h4>
        </div>
    </div>

    <div class="alert alert-info mt-4">
    <b>Model Interpretation:</b><br>
    {{ interpretation_text }}
</div>
</div>

<div class="card p-4 shadow">
    <h6>Feature Importance</h6>
    <canvas id="importanceChart"></canvas>
</div>

<br>

<div class="card p-4 shadow">
    <h6>Feature Importance Table</h6>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Feature</th>
                <th>Importance Score</th>
            </tr>
        </thead>
        <tbody>
            {% for f in feature_data %}
            <tr>
                <td>{{ f.name }}</td>
                <td>{{ f.importance }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</div>

<script>
let labels = [
{% for f in feature_data %}
"{{ f.name }}",
{% endfor %}
];

let values = [
{% for f in feature_data %}
{{ f.importance }},
{% endfor %}
];

new Chart(document.getElementById("importanceChart"),{
    type:'bar',
    data:{
        labels:labels,
        datasets:[{
            label:'Feature Importance',
            data:values,
            backgroundColor:'#0d6efd'
        }]
    }
});
</script>

</body>
</html>

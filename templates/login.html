<!DOCTYPE html>
<html>
<head>
    <title>AI Student Risk System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(-45deg,#2563eb,#3b82f6,#1e40af,#1d4ed8);
            background-size:400% 400%;
            animation:gradientBG 10s ease infinite;
            font-family:'Segoe UI',sans-serif;
        }

        @keyframes gradientBG {
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        .login-card {
            width:430px;
            padding:40px;
            border-radius:20px;
            backdrop-filter: blur(18px);
            background: rgba(255,255,255,0.15);
            box-shadow:0 25px 45px rgba(0,0,0,0.25);
            color:white;
        }

        .title {
            text-align:center;
            margin-bottom:25px;
            font-weight:600;
            letter-spacing:1px;
        }

        .tab-btn {
            width:50%;
            border:none;
            padding:10px;
            font-weight:600;
            background:rgba(255,255,255,0.2);
            color:white;
        }

        .tab-btn.active {
            background:white;
            color:#2563eb;
        }

        .form-control, .form-select {
            background:rgba(255,255,255,0.2);
            border:none;
            color:white;
            border-radius:12px;
        }

        .form-control::placeholder {
            color:#e5e7eb;
        }

        .form-control:focus, .form-select:focus {
            background:rgba(255,255,255,0.3);
            color:white;
            box-shadow:none;
        }

        .form-select option {
            color:black;
        }

        .btn-primary {
            background:white;
            color:#2563eb;
            border:none;
            border-radius:25px;
            font-weight:600;
        }

        .btn-primary:hover {
            background:#e0e7ff;
        }

        .hidden { display:none; }

        .small-text {
            text-align:center;
            margin-top:15px;
            font-size:13px;
            color:#e5e7eb;
        }
    </style>
</head>
<body>

<div class="login-card">

    <h4 class="title">
        <i class="fa-solid fa-brain"></i> AI Student Risk System
    </h4>

    <div class="d-flex mb-4">
        <button class="tab-btn active" onclick="showLogin()" id="loginTab">Sign In</button>
        <button class="tab-btn" onclick="showSignup()" id="signupTab">Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <form method="POST" id="loginForm">

        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>

        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>

        <div class="mb-3">
            <select name="role" class="form-select" required>
                <option value="Admin">Admin</option>
                <option value="Teacher">Teacher</option>
                <option value="Student">Student</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary w-100">Sign In</button>
    </form>

    <!-- SIGNUP FORM -->
    <form method="POST" action="/signup" id="signupForm" class="hidden">
        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="New Username" required>
        </div>

        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="New Password" required>
        </div>

        <button type="submit" class="btn btn-success w-100">Create Account</button>
    </form>

    <div class="small-text">
        Demo users: admin / teacher / student <br> Password: 123456
    </div>

</div>

<script>
function showSignup(){
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("signupForm").classList.remove("hidden");
    document.getElementById("loginTab").classList.remove("active");
    document.getElementById("signupTab").classList.add("active");
}

function showLogin(){
    document.getElementById("signupForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
    document.getElementById("signupTab").classList.remove("active");
    document.getElementById("loginTab").classList.add("active");
}
</script>

</body>
</html>
